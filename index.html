<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senior Frontend – Interview Cheatsheet</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
<div class="topbar">
  <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <span class="topbar-logo">⚡ Interview Cheatsheet</span>
</div>
<div class="backdrop" id="backdrop"></div>

<nav class="sidebar" id="sidebar">
<div class="search-wrap">
    <div class="search-row">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="search" id="searchInput" placeholder="Search topics…" autocomplete="off" spellcheck="false" aria-label="Search sections">
        <button class="search-clear" id="searchClear" aria-label="Clear search">✕</button>
        <span class="search-kbd" id="searchKbd">/</span>
      </div>
      <button class="cat-btn" id="catBtn" aria-label="Filter categories" title="Filter categories">⊞</button>
    </div>
    <div class="search-count" id="searchCount"></div>
  </div>
  <div id="navList"></div>
</nav>

<main class="main">
  <div class="page-header">
    <h1>Senior Frontend Developer — Interview Cheatsheet</h1>
    <p>Angular 18+ · TypeScript · RxJS · NgRx · Testing · Architecture · CI/CD · Docker · 57 sections</p>
  </div>
  <div class="sections-container"></div>
</main>

<div class="cat-panel" id="catPanel">
  <h2>Filter Categories</h2>
  <p>Select which topics to show. Your choice is saved in localStorage.</p>
  <div class="cat-grid" id="catGrid"></div>
  <div class="cat-panel-footer">
    <button class="cat-apply" id="catApply">Apply</button>
    <button class="cat-cancel" id="catCancel">Cancel</button>
  </div>
</div>

<script src="sections/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
